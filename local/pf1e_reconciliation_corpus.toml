# Local-only Pathfinder 1e reconciliation corpus.
# This file is intentionally kept out of git via the repo .gitignore.

title = "Pathfinder 1e first-pass reconciliation corpus"
game_system = "pathfinder"
created = "2026-04-13"
notes = """
This is a pragmatic first-pass corpus for trying real cross-format
reconciliation between PCGen and HeroLab.

The groups below are not all equally strong:
- Monster Focus Skeletons is an exact title-level overlap.
- Pathfinder Unchained is a strong Paizo product-family overlap.
- Ultimate Psionics and Path of War are strong publisher/product-family overlaps.

This manifest is meant to be edited locally as we learn more.
"""

[[group]]
name = "Monster Focus Skeletons"
kind = "exact_title_overlap"
confidence = "high"
notes = "Best exact-match Pathfinder 1e title overlap found in both corpora."
pcgen_paths = [
